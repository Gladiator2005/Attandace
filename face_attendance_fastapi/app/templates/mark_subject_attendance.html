{% extends "base.html" %}
{% block title %}Mark Attendance – AntiGrav Access{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Mark Subject Attendance</h1>
    <p>Select a subject and mark attendance for today's class.</p>
</div>

<div class="card" style="max-width:800px;margin-bottom:24px;">
    <div class="form-row">
        <div class="form-group">
            <label class="form-label">Subject *</label>
            <select class="form-input" id="att-subject" onchange="loadStudentsForAttendance()">
                <option value="">Select Subject</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Date *</label>
            <input type="date" class="form-input" id="att-date">
        </div>
    </div>
</div>

<div id="students-attendance-area" style="display:none;">
    <div class="card" style="max-width:800px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <h3><i class="fas fa-clipboard-check"></i> Student List</h3>
            <div style="display:flex;gap:8px;">
                <button class="btn btn-success btn-sm" onclick="markAll('Present')"><i class="fas fa-check-double"></i>
                    All Present</button>
                <button class="btn btn-danger btn-sm" onclick="markAll('Absent')"><i class="fas fa-times"></i> All
                    Absent</button>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Enrollment</th>
                    <th>Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="att-students-tbody"></tbody>
        </table>
        <div style="margin-top:20px;display:flex;gap:12px;">
            <button class="btn btn-primary btn-lg" onclick="submitSubjectAttendance()"><i class="fas fa-save"></i>
                Submit Attendance</button>
            <button class="btn btn-secondary btn-lg" onclick="reconcileAttendance()"
                title="Compare face scans with faculty records"><i class="fas fa-balance-scale"></i>
                Reconcile</button>
        </div>
    </div>
</div>
{% endblock %}
