name: face-attendance-api
region: nyc

services:
  - name: api
    github:
      branch: main
      deploy_on_push: true
      repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
    dockerfile_path: face_attendance_fastapi/Dockerfile
    
    # Basic tier ($5/month but you have $200 credit!)
    instance_count: 1
    instance_size_slug: basic-xxs
    
    http_port: 8000
    
    routes:
      - path: /
    
    envs:
      - key: ENVIRONMENT
        value: "production"
      - key: DEBUG
        value: "False"
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
      - key: SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
    
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

databases:
  - name: db
    engine: PG
    version: "15"
    production: false  # Set to false for cheaper dev database
    size: basic-xs     # $7/month but covered by credits
    num_nodes: 1

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      branch: main
      deploy_on_push: true
      repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
    dockerfile_path: face_attendance_fastapi/Dockerfile
    instance_count: 1
    instance_size_slug: basic-xxs
    run_command: alembic upgrade head
    envs:
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
