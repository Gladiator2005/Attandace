services:
  - type: web
    name: face-attendance-api
    env: python
    region: oregon
    plan: free
    branch: master
    rootDir: face_attendance_fastapi
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      pip install gunicorn
    startCommand: |
      alembic upgrade head && gunicorn app.main:app --workers 2 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: attendance-db
          property: connectionString
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: RATE_LIMIT_ENABLED
        value: True
      - key: MAX_REQUESTS_PER_MINUTE
        value: 60

databases:
  - name: attendance-db
    plan: free
    databaseName: attendance
    user: attendance_user
    region: oregon
